<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>온체인 투표 시스템</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══════════════════════════════ 헤더 (공통) ═══════════════════════════ -->
  <header id="app-header">
    <div class="header-inner">
      <span class="header-logo">🗳️ 온체인 투표 시스템</span>
      <div class="header-wallet">
        <!-- 연결 전 -->
        <button id="btn-connect" class="btn btn-primary">지갑 연결하기</button>
        <!-- 연결 후 -->
        <span id="wallet-address" class="wallet-chip hidden"></span>
        <button id="btn-disconnect" class="btn btn-secondary hidden">연결 해제</button>
      </div>
    </div>
    <!-- 네트워크·컨트랙트 정보 바 (지갑 연결 + Sepolia + 컨트랙트 연결 시 표시) -->
    <div id="network-info" class="header-network hidden">
      <span>📡 네트워크: Sepolia Testnet</span>
      <span id="contract-address-header"></span>
    </div>
  </header>

  <!-- ═══════════════════════════════ 메인 콘텐츠 ══════════════════════════ -->
  <main id="app-main"></main>

  <!-- ═══════════════════════════════ 푸터 (공통) ═══════════════════════════ -->
  <footer id="app-footer" class="hidden">
    <a id="etherscan-link" href="#" target="_blank" rel="noopener noreferrer"></a>
  </footer>

  <!-- ═══════════════════════════════ SCR-04: MetaMask 안내 오버레이 ════════ -->
  <div id="overlay-metamask" class="overlay hidden"
       role="dialog" aria-modal="true" aria-labelledby="overlay-meta-title">
    <div class="overlay-card">
      <div class="overlay-icon">🦊</div>
      <h2 id="overlay-meta-title">MetaMask 연결 필요</h2>
      <p>투표에 참여하려면 MetaMask 지갑 연결이 필요합니다.</p>

      <div class="overlay-section">
        <p>MetaMask가 설치되지 않은 경우:</p>
        <a href="https://metamask.io/download/"
           target="_blank" rel="noopener noreferrer"
           class="btn btn-primary btn-block">MetaMask 설치하기 ↗</a>
      </div>

      <div class="overlay-section">
        <p>이미 설치되어 있다면:</p>
        <button id="overlay-btn-connect" class="btn btn-primary btn-block">지갑 연결하기</button>
      </div>

      <button id="overlay-btn-close" class="btn btn-secondary btn-block mt-4">닫기</button>
    </div>
  </div>

  <!-- ═══════════════════════════════ SCR-05: 네트워크 오류 오버레이 ════════ -->
  <div id="overlay-network" class="overlay hidden"
       role="dialog" aria-modal="true" aria-labelledby="overlay-net-title">
    <div class="overlay-card">
      <div class="overlay-icon">⚠️</div>
      <h2 id="overlay-net-title">잘못된 네트워크</h2>
      <p>이 서비스는 Ethereum Sepolia 테스트넷에서만 동작합니다.</p>
      <div class="network-info-box">
        <div>현재 네트워크: <span id="current-network-name">알 수 없음</span></div>
        <div>필요 네트워크: <strong>Sepolia Testnet</strong></div>
      </div>
      <button id="btn-switch-network" class="btn btn-primary btn-block">
        Sepolia로 전환하기
      </button>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
